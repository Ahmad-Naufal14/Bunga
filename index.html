<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #0b0b0b;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            color: white;
        }

        #lock-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: 0.5s;
        }

        .lock-icon {
            font-size: 60px;
            cursor: pointer;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .container {
            text-align: center;
            display: none;
            animation: fadeIn 1s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* --- LOVE ANTI BENGKAK (SVG) --- */
        .heart-svg {
            width: 150px;
            fill: #ff2e63;
            filter: drop-shadow(0 0 20px #ff2e63);
            animation: beat 0.8s infinite alternate;
        }

        @keyframes beat {
            to { transform: scale(1.2); }
        }

        h1 {
            margin-top: 20px;
            font-size: 2.5rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            text-shadow: 0 0 10px #ff2e63;
        }

        .mentai-box {
            font-size: 50px;
            margin-top: 15px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-15px);}
            60% {transform: translateY(-7px);}
        }

        .flower {
            position: absolute;
            top: -10%;
            user-select: none;
            z-index: -1;
            animation: fall linear infinite;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }
    </style>
</head>
<body>

    <div id="lock-screen" onclick="unlock()">
        <div class="lock-icon">🔒</div>
        <p style="margin-top: 20px; color: #ff2e63;">Klik untuk buka kejutan</p>
    </div>

    <div class="container" id="main-content">
        <svg class="heart-svg" viewBox="0 0 32 29.6">
            <path d="M23.6,0c-3.4,0-6.3,2.7-7.6,5.6C14.7,2.7,11.8,0,8.4,0C3.8,0,0,3.8,0,8.4c0,9.4,9.5,11.9,16,21.2
            c6.1-9.3,16-12.1,16-21.2C32,3.8,28.2,0,23.6,0z"/>
        </svg>
        
        <h1>Bilaa bau</h1>
        <div class="mentai-box">🥟🍱</div>
        <p style="color: #ffb800; font-weight: bold;">Ini Dimsum Mentai buat kamu! ✨</p>
        <span style="font-style: italic; opacity: 0.8;">Semangatt yaa hari ini🫰🏻</span>
    </div>

    <script>
        function unlock() {
            document.getElementById('lock-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                setInterval(createFlower, 300);
            }, 500);
        }

        function createFlower() {
            const flower = document.createElement('div');
            flower.classList.add('flower');
            flower.innerHTML = '🌸'; 
            flower.style.left = Math.random() * 100 + 'vw';
            flower.style.animationDuration = Math.random() * 3 + 2 + 's';
            flower.style.fontSize = Math.random() * 20 + 15 + 'px';
            document.body.appendChild(flower);
            setTimeout(() => flower.remove(), 5000);
        }
    </script>
</body>
</html>
