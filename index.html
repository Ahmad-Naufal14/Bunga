<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #0b0b0b;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            color: white;
        }

        /* --- Layar Kunci (Lock Screen) --- */
        #lock-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: 0.5s;
        }

        .lock-icon {
            font-size: 80px;
            cursor: pointer;
            filter: drop-shadow(0 0 10px #ff2e63);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        /* --- Konten Utama --- */
        .container {
            text-align: center;
            position: relative;
            display: none; /* Disembunyikan dulu */
        }

        .heart {
            position: relative;
            width: 100px;
            height: 90px;
            background-color: #ff2e63;
            margin: 0 auto;
            transform: rotate(-45deg);
            animation: beat 0.8s infinite alternate;
            box-shadow: 0 0 40px #ff2e63;
        }

        .heart::before, .heart::after {
            content: "";
            position: absolute;
            width: 100px;
            height: 100px;
            background-color: #ff2e63;
            border-radius: 50%;
        }

        .heart::before { top: -50px; left: 0; }
        .heart::after { top: 0; left: 50px; }

        @keyframes beat {
            to { transform: scale(1.2) rotate(-45deg); }
        }

        h1 {
            margin-top: 60px;
            font-size: 2.5rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            text-shadow: 0 0 10px #ff2e63;
        }

        .mentai-box {
            font-size: 50px;
            margin-top: 20px;
            display: block;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-20px);}
            60% {transform: translateY(-10px);}
        }

        .flower {
            position: absolute;
            color: #ff75a0;
            font-size: 20px;
            top: -10%;
            user-select: none;
            z-index: -1;
            animation: fall linear infinite;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }
    </style>
</head>
<body>

    <div id="lock-screen">
        <div class="lock-icon" onclick="unlock()">🔒</div>
        <p style="margin-top: 20px; color: #ff2e63;">hehehe coba klik gemboknya</p>
    </div>

    <div class="container" id="main-content">
        <div class="heart"></div>
        <h1>Bila bau</h1>
        <div class="mentai-box">🥟🍱</div>
        <p style="color: #ffb800; font-weight: bold; font-size: 1.2rem;">Ini Dimsum Mentai buat kamuu ✨</p>
        <span style="font-style: italic; opacity: 0.8; margin-top: 10px; display: block;">Semangatt yaa hari ini🫰🏻</span>
    </div>

    <script>
        function unlock() {
            // Sembunyikan lock screen
            document.getElementById('lock-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('lock-screen').style.display = 'none';
                // Munculkan konten utama
                document.getElementById('main-content').style.display = 'block';
                // Mulai munculkan bunga
                setInterval(createFlower, 300);
            }, 500);
        }

        function createFlower() {
            const flower = document.createElement('div');
            flower.classList.add('flower');
            flower.innerHTML = '🌸'; 
            flower.style.left = Math.random() * 100 + 'vw';
            flower.style.animationDuration = Math.random() * 3 + 2 + 's';
            flower.style.opacity = Math.random();
            flower.style.fontSize = Math.random() * 20 + 10 + 'px';
            
            document.body.appendChild(flower);

            setTimeout(() => {
                flower.remove();
            }, 5000);
        }
    </script>
</body>
</html>
